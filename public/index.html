<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios de Programación</title>

<style>
/* TODO TU CSS ORIGINAL (NO CAMBIÉ NADA) */
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #cd07d4; color: #ebe7e5; }
header { min-height: 90vh; display: flex; align-items: center; justify-content: center; padding: 50px 8%; background: linear-gradient(135deg, #160217, #271125, #3b1e21); }
.hero { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; max-width: 1100px; }
.hero h1 { font-size: 48px; color: #dc3cde; }
.hero p { color: #e1cbdb; }
section { padding: 60px 8%; }
h2 { color: #d238f8; text-align: center; }
.formulario { max-width: 700px; margin: auto; background: #341e3b; padding: 30px; border-radius: 20px; }
input, textarea, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; background: #5a1d67; color: white; }
button { background: #f838ef; color: #170216; padding: 14px; border-radius: 10px; cursor: pointer; }
#respuesta { margin-top: 15px; font-weight: bold; }
</style>

</head>

<body>

<section id="contacto">
  <h2>Contáctame</h2>

  <div class="formulario">
    <form id="formulario">

```
  <input type="text" placeholder="Nombre" id="nombre" required>
  <input type="email" placeholder="Correo" id="correo" required>

  <!-- 🔥 AHORA OBLIGATORIO -->
  <input type="text" placeholder="Teléfono" id="telefono" required>

  <!-- 🔥 AHORA OBLIGATORIO -->
  <select id="servicio" required>
    <option value="">Selecciona un servicio</option>
    <option value="Página web">Página web</option>
    <option value="Sistema CRUD">Sistema CRUD</option>
    <option value="Formulario con base de datos">Formulario con base de datos</option>
    <option value="Aplicación básica">Aplicación básica</option>
    <option value="Asesoría de programación">Asesoría de programación</option>
  </select>

  <textarea placeholder="Escribe tu mensaje" id="mensaje" required></textarea>

  <button type="submit">Enviar mensaje</button>

</form>

<p id="respuesta"></p>
```

  </div>
</section>

<script>
const form = document.getElementById("formulario");
const respuesta = document.getElementById("respuesta");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    correo: document.getElementById("correo").value,
    telefono: document.getElementById("telefono").value,
    servicio: document.getElementById("servicio").value,
    mensaje: document.getElementById("mensaje").value
  };

  if (!data.nombre || !data.correo || !data.telefono || !data.servicio || !data.mensaje) {
    respuesta.style.color = "red";
    respuesta.innerText = "Llena todos los campos";
    return;
  }

  try {
    respuesta.style.color = "yellow";
    respuesta.innerText = "Enviando...";

    const res = await fetch("/contacto", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (json.ok) {
      respuesta.style.color = "lightgreen";
      respuesta.innerText = "Mensaje enviado correctamente ✅";
      form.reset();
    } else {
      respuesta.style.color = "red";
      respuesta.innerText = json.mensaje || "Error al enviar";
    }

  } catch (err) {
    respuesta.style.color = "red";
    respuesta.innerText = "Error del servidor ❌";
  }
});
</script>

</body>
</html>
